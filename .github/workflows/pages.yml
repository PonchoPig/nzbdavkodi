name: Pages

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Download release addon zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-zips
          gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName \
            --jq '.[].tagName' |
          while read -r tag; do
            gh release download "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern 'plugin.video.nzbdav-*.zip' \
              --dir release-zips \
              --clobber || echo "No addon zip found for $tag"
          done
          target_tag="${{ github.event.workflow_run.head_branch || '' }}"
          case "$target_tag" in
            v*) ;;
            *)
              target_tag=$(gh release view \
                --repo "$GITHUB_REPOSITORY" \
                --json tagName \
                --jq '.tagName')
              ;;
          esac
          echo "Publishing addon release $target_tag"
          rm -f release-addon.zip
          for attempt in 1 2 3 4 5; do
            if gh release download \
              "$target_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern 'plugin.video.nzbdav-*.zip' \
              --output release-addon.zip; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to download addon zip for $target_tag" >&2
              exit 1
            fi
            sleep 15
          done

      - name: Generate repository metadata
        run: python3 scripts/generate_repo.py --output-dir pages-dist/repo/zips --addon-zip release-addon.zip --legacy-addon-zip-dir release-zips

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
