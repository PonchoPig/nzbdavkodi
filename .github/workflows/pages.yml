name: Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "repo/repository.nzbdav/**"
      - "repo/plugin.video.nzbdav/addon.xml"
      - "scripts/generate_repo.py"
      - "scripts/select_stable_release.py"
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Read GitHub releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" > releases.json

      - name: Select latest stable addon release
        id: stable_release
        run: python3 scripts/select_stable_release.py releases.json >> "$GITHUB_OUTPUT"

      - name: Download selected addon release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh release download "${{ steps.stable_release.outputs.tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "${{ steps.stable_release.outputs.asset_name }}" \
              --output release-addon.zip; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to download selected addon release asset" >&2
              exit 1
            fi
            sleep 15
          done

      - name: Generate Pages repository
        run: >-
          python3 scripts/generate_repo.py
          --output-dir pages-dist
          --addon-zip release-addon.zip
          --smoke-check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
